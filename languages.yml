name: Update language stats

on:
  schedule:
    - cron: '17 4 * * *'          # daily at 04:17 UTC
  workflow_dispatch:               # run manually from the Actions tab
  push:
    branches: [main]
    paths:
      - build.py
      - fetch_langs.py
      - .github/workflows/languages.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch real language stats
        env:
          GH_USER: sworup-kumar
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}          # optional: add to include private repos
        run: python fetch_langs.py

      - name: Rebuild SVGs
        run: python build.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg langs.json 2>/dev/null || git add assets/*.svg
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: refresh language stats"
            git push
          fi
